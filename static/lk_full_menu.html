<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background-color: #fdfaf0; font-family: sans-serif; display: flex; min-height: 1400px; color: #222; }
        .sidebar { width: 280px; background: #ffffff; border-right: 2px solid #eee; padding: 40px 20px; position: fixed; height: 100vh; }
        .main { margin-left: 320px; padding: 60px; flex-grow: 1; }
        .logo { font-size: 24px; font-weight: 900; margin-bottom: 40px; color: #222; }
        .nav-item { padding: 15px; margin-bottom: 10px; font-weight: bold; border-radius: 10px; cursor: pointer; color: #555; }
        .active { background: #ffcc00; color: #222; }
        .section { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 40px; border-bottom: 6px solid #ffcc00; }
        .title { font-size: 28px; font-weight: 900; margin-bottom: 30px; }
        
        /* Таблица заказов */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: #aaa; text-transform: uppercase; font-size: 12px; }
        td { padding: 20px 15px; border-bottom: 1px solid #f9f9f9; font-weight: bold; font-size: 14px; }
        .status { background: #f1f8e9; color: #2e7d32; padding: 6px 12px; border-radius: 20px; font-size: 12px; }
        
        /* Форма данных */
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #888; font-size: 13px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #f0f0f0; font-size: 16px; font-weight: bold; box-sizing: border-box; }
        .btn { background: #ffcc00; border: none; padding: 18px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 16px; width: 100%; }
        
        /* Бейджи QR */
        .qr-placeholder { width: 100px; height: 100px; background: #f0f0f0; border-radius: 10px; display: flex; align-items: center; text-align: center; font-size: 10px; color: #aaa; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ANIMAL PARK</div>
        <div class="nav-item">Обзор аккаунта</div>
        <div class="nav-item active">История заказов</div>
        <div class="nav-item">Данные профиля</div>
        <div class="nav-item">Безопасность</div>
    </div>
    <div class="main">
        <!-- СЕКЦИЯ: ИСТОРИЯ ЗАКАЗОВ (miniShop2) -->
        <div class="section">
            <div class="title">Мои заказы</div>
            <table>
                <thead>
                    <tr><th>Заказ</th><th>Состав</th><th>Сумма</th><th>Статус</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#12890<br><small style="color:#aaa">15.02.2026</small></td>
                        <td>Билет "Взрослый" x2<br>Корм для животных x1</td>
                        <td>45.00 BYN</td>
                        <td><span class="status">Выполнен</span></td>
                    </tr>
                    <tr>
                        <td>#12875<br><small style="color:#aaa">10.02.2026</small></td>
                        <td>Билет "Детский" x1</td>
                        <td>10.00 BYN</td>
                        <td><span class="status">Выполнен</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- СЕКЦИЯ: ДАННЫЕ ПРОФИЛЯ (Office) -->
        <div class="section">
            <div class="title">Персональные данные</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" value="Евгений">
                </div>
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" value="Администратор">
                </div>
            </div>
            <div class="form-group">
                <label>Электронная почта</label>
                <input type="email" value="errayse@example.com">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" value="+375 (29) 000-00-00">
            </div>
            <button class="btn">Сохранить изменения</button>
        </div>
    </div>
</body>
</html>
