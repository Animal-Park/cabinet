<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в кабинет | Animal Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container fade-in">
        <div class="logo">ANIMAL PARK</div>
        <div class="subtitle">Личный кабинет посетителя</div>
        
        <div class="tabs">
            <div class="tab active" data-target="login">Вход</div>
            <div class="tab" data-target="register">Регистрация</div>
        </div>

        <!-- Форма Входа -->
        <div id="form-login" class="form-content active">
            <form>
                <div style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #888; font-size: 12px;">E-mail или Телефон</label>
                    <input type="email" placeholder="example@mail.com" style="width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #f0f0f0; box-sizing: border-box; font-weight: 700;">
                </div>
                <div style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #888; font-size: 12px;">Пароль</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #f0f0f0; box-sizing: border-box; font-weight: 700;">
                </div>
                <div style="text-align: right; margin-bottom: 25px;">
                    <a href="#" id="forgot-password" style="color: #888; font-size: 12px; text-decoration: none; font-weight: bold;">Забыли пароль?</a>
                </div>
                <button type="button" class="btn" onclick="location.href='index.html'">Войти в систему</button>
            </form>
        </div>

        <!-- Форма Регистрации -->
        <div id="form-register" class="form-content">
            <form>
                <div style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #888; font-size: 12px;">Имя Фамилия</label>
                    <input type="text" placeholder="Евгений Александров" style="width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #f0f0f0; box-sizing: border-box; font-weight: 700;">
                </div>
                <div style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 8px; color: #888; font-size: 12px;">E-mail</label>
                    <input type="email" placeholder="example@mail.com" style="width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #f0f0f0; box-sizing: border-box; font-weight: 700;">
                </div>
                <button type="button" class="btn">Создать аккаунт</button>
            </form>
        </div>

        <div style="margin-top: 30px; font-size: 13px; font-weight: bold; color: #ccc;">
            Нажимая "Войти", вы соглашаетесь с правилами парка.
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/is_js/0.9.0/is.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
