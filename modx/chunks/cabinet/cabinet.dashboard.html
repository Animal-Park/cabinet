<!-- cabinet.dashboard — Главная страница кабинета (обзор аккаунта) -->
<div class="fade-in">
    <h1 class="h1">Обзор аккаунта</h1>

    <!-- Статистика -->
    [[!cabinetOrdersStats?
        &tpl=`cabinet.dashboard.stats`
    ]]

    <!-- Недавняя активность -->
    <div class="section-card">
        <h2 class="h2">Недавняя активность</h2>
        [[!cabinetOrders?
            &limit=`3`
            &tpl=`cabinet.dashboard.recent.orders`
        ]]
    </div>

    <!-- Быстрые действия -->
    <div class="section-card">
        <h2 class="h2">Быстрые действия</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <a href="[[~[[++cabinet_home_page_id]]]]profile/" style="background: var(--accent-green-light); padding: 25px; border-radius: 20px; border-left: 6px solid var(--accent-green); text-decoration: none; color: var(--text-main);">
                <div style="font-weight: 900; margin-bottom: 5px;">Редактировать профиль</div>
                <div style="font-size: 14px; color: #555;">Обновите персональные данные</div>
            </a>
            <a href="[[~[[++cabinet_home_page_id]]]]orders/" style="background: var(--accent-green-light); padding: 25px; border-radius: 20px; border-left: 6px solid var(--accent-green); text-decoration: none; color: var(--text-main);">
                <div style="font-weight: 900; margin-bottom: 5px;">История заказов</div>
                <div style="font-size: 14px; color: #555;">Посмотрите все ваши заказы</div>
            </a>
        </div>
    </div>
</div>
