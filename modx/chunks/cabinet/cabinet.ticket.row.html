<!-- cabinet.ticket.row — Строка активного билета с QR-кодом -->
<div class="ticket-card">
    <div class="qr-mock">QR CODE</div>
    <div>
        <div style="font-size: 18px; font-weight: 900;">[[+pagetitle]]</div>
        <div style="color: #888; font-size: 13px;">Действителен до: [[+valid_until:date=`%d.%m.%Y`]]</div>
        <div style="margin-top: 5px; color: var(--accent-green); font-weight: bold;">Статус: [[+ticket_status:default=`Готов к использованию`]]</div>
    </div>
</div>
