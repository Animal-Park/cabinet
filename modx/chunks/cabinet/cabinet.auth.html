<!-- cabinet.auth — Формы авторизации, регистрации и восстановления (сниппет cabinetAuth) -->
<div class="auth-container fade-in" id="cabinet-auth">
    <div class="logo">ANIMAL PARK</div>
    <div class="subtitle">Личный кабинет посетителя</div>

    <div class="tabs">
        <div class="tab {if $widget == 'login'}active{/if}" data-cabinet-widget="login">Вход</div>
        <div class="tab {if $widget == 'register'}active{/if}" data-cabinet-widget="register">Регистрация</div>
    </div>

    <!-- ===== Форма Входа ===== -->
    <div id="cabinet-form-login" class="form-content {if $widget == 'login'}active{/if}">
        <form method="post" action="" data-cabinet-form="login">
            <input type="hidden" name="action" value="login">
            <input type="hidden" name="cabinet_csrf_token" value="{$csrf_token}">

            <div class="form-group" style="text-align: left;">
                <label>E-mail или Телефон</label>
                <input type="text" name="username" value="{$username}" placeholder="example@mail.com" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div style="text-align: right; margin-bottom: 25px;">
                <a href="#" data-cabinet-widget="recovery" style="color: #888; font-size: 12px; text-decoration: none; font-weight: bold;">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn">Войти в систему</button>
        </form>

        {if $socials}
        <div style="margin-top: 25px; text-align: center; font-size: 13px; color: #ccc; font-weight: bold;">или войдите через</div>
        <div class="social-login">
            {$socials}
        </div>
        {/if}
    </div>

    <!-- ===== Форма Регистрации ===== -->
    <div id="cabinet-form-register" class="form-content {if $widget == 'register'}active{/if}">
        <form method="post" action="" data-cabinet-form="register">
            <input type="hidden" name="action" value="register">
            <input type="hidden" name="cabinet_csrf_token" value="{$csrf_token}">

            <div class="form-group" style="text-align: left;">
                <label>Имя Фамилия</label>
                <input type="text" name="fullname" value="{$fullname}" placeholder="Евгений Александров">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>E-mail</label>
                <input type="email" name="email" value="{$email}" placeholder="example@mail.com" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Телефон</label>
                <input type="tel" name="phone" value="{$phone}" placeholder="+375 (29) 000-00-00">
            </div>
            <button type="submit" class="btn">Создать аккаунт</button>
        </form>
    </div>

    <!-- ===== Форма Восстановления пароля ===== -->
    <div id="cabinet-form-recovery" class="form-content {if $widget == 'recovery'}active{/if}">
        <form method="post" action="" data-cabinet-form="recovery">
            <input type="hidden" name="action" value="recovery">
            <input type="hidden" name="cabinet_csrf_token" value="{$csrf_token}">

            <div class="form-group" style="text-align: left;">
                <label>E-mail для восстановления</label>
                <input type="email" name="email" value="{$email}" placeholder="example@mail.com" required>
            </div>
            <button type="submit" class="btn">Восстановить пароль</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="#" data-cabinet-widget="login" style="color: #888; font-size: 13px; font-weight: bold; text-decoration: none;">Вернуться к входу</a>
        </div>
    </div>

    <div style="margin-top: 30px; font-size: 13px; font-weight: bold; color: #ccc;">
        Нажимая «Войти», вы соглашаетесь с правилами парка.
    </div>
</div>
