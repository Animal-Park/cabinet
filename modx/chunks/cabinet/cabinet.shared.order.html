<!-- cabinet.shared.order — Расшаренный заказ (сниппет cabinetSharedOrder) -->
<div class="fade-in">
    <h1 class="h1">Заказ #{$order.num}</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Этот заказ был предоставлен для просмотра</p>

    <div class="section-card">
        <div class="h2">Состав заказа</div>
        <table>
            <thead>
                <tr>
                    <th>Товар</th>
                    <th>Кол-во</th>
                    <th>Цена</th>
                    <th>Сумма</th>
                </tr>
            </thead>
            <tbody>
                {foreach $order.products as $product}
                <tr>
                    <td>{$product.name}</td>
                    <td>{$product.count}</td>
                    <td>{$product.price} {$order.currency}</td>
                    <td>{$product.cost} {$order.currency}</td>
                </tr>
                {/foreach}
            </tbody>
        </table>
        <div style="margin-top: 20px; text-align: right; font-size: 20px; font-weight: 900;">
            Итого: {$order.cost} {$order.currency}
        </div>
    </div>
</div>
