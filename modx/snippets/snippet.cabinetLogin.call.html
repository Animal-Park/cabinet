<!--
    Вызов сниппета cabinetLogin
    Размещается в шапке сайта (header) для вывода ссылки «Войти» или меню кабинета.
    Работает на всех страницах сайта.
-->

<!-- Базовый вызов (в шапке/навигации основного сайта) -->
[[!cabinetLogin?
    &tpl=`cabinet.login`
    &css=``
    &js=``
]]

<!--
    Параметры:
    &cabinetPageId  — ID страницы кабинета (0 = берёт из настройки cabinet_home_page_id)
    &loginPageId    — ID страницы после авторизации (0 = cabinet_login_page_id)
    &logoutPageId   — ID страницы после выхода (0 = cabinet_logout_page_id)
    &tpl            — Чанк оформления (cabinet.login)
    &css            — Путь к CSS файлу (пустой, чтобы не грузить дефолтный)
    &js             — Путь к JS файлу (пустой, чтобы не грузить дефолтный)
-->
